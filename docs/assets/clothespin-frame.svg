<svg viewBox="0 0 680 484" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="680" height="484" fill="#ffffff"/>

  <text x="40" y="30" font-size="16" font-weight="700" fill="#0f172a">洗濯バサミ：7つの GRIP ソケット（メス）と JAW コネクタ（オス）</text>
  <text x="40" y="50" font-size="12" fill="#64748b">原点＝金属スプリング中心 ／ 寸法 6.0(長さ X)×3.9(高さ Z)×1.2(厚み Y)cm ／ +X＝鼻先方向（図では左）</text>

  <!-- plastic levers -->
  <rect x="300" y="146" width="320" height="28" rx="13" fill="#2f6fe0" stroke="#1d4ed8" stroke-width="2" transform="rotate(-11 390 168)"/>
  <rect x="300" y="146" width="320" height="28" rx="13" fill="#2f6fe0" stroke="#1d4ed8" stroke-width="2" transform="rotate(11 390 168)"/>

  <!-- metal spring ring -->
  <circle cx="390" cy="168" r="44" fill="none" stroke="#9aa0a6" stroke-width="5"/>
  <circle cx="390" cy="168" r="30" fill="none" stroke="#b9bdc2" stroke-width="3"/>

  <!-- JAW connector (mouth) -->
  <circle cx="252" cy="168" r="9" fill="#ef6c4d"/>
  <line x1="263" y1="168" x2="294" y2="168" stroke="#ef6c4d" stroke-width="2.5"/>
  <polygon points="300,168 291,163 291,173" fill="#ef6c4d"/>
  <text x="252" y="149" font-size="12" font-weight="700" fill="#b91c1c" text-anchor="middle">JAW</text>

  <!-- 1-DOF grip sockets (roll only): g0,g1,g2,g3,g5 -->
  <g fill="#f59e0b" stroke="#b45309" stroke-width="1.5">
    <circle cx="615" cy="124" r="9"/>
    <circle cx="615" cy="212" r="9"/>
    <circle cx="302" cy="151" r="9"/>
    <circle cx="302" cy="185" r="9"/>
    <circle cx="434" cy="168" r="9"/>
  </g>
  <!-- 2-DOF grip sockets (roll + pitch): g4,g6 -->
  <g fill="#0d9488" stroke="#0f766e" stroke-width="1.5">
    <circle cx="390" cy="124" r="9"/>
    <circle cx="390" cy="212" r="9"/>
  </g>

  <g font-size="12" font-weight="700">
    <text x="598" y="120" text-anchor="end" fill="#92400e">g0</text>
    <text x="598" y="224" text-anchor="end" fill="#92400e">g1</text>
    <text x="302" y="139" text-anchor="middle" fill="#92400e">g2</text>
    <text x="302" y="205" text-anchor="middle" fill="#92400e">g3</text>
    <text x="452" y="172" text-anchor="start" fill="#92400e">g5</text>
    <text x="390" y="112" text-anchor="middle" fill="#0f766e">g4</text>
    <text x="390" y="232" text-anchor="middle" fill="#0f766e">g6</text>
  </g>

  <!-- legend -->
  <line x1="40" y1="272" x2="640" y2="272" stroke="#cbd5e1" stroke-width="1"/>
  <g fill="#f59e0b" stroke="#b45309" stroke-width="1.2">
    <circle cx="70" cy="300" r="6"/><circle cx="70" cy="324" r="6"/><circle cx="70" cy="348" r="6"/><circle cx="70" cy="372" r="6"/>
    <circle cx="360" cy="300" r="6"/>
  </g>
  <g fill="#0d9488" stroke="#0f766e" stroke-width="1.2">
    <circle cx="360" cy="324" r="6"/><circle cx="360" cy="348" r="6"/>
  </g>
  <g font-size="12" fill="#334155">
    <text x="86" y="304">g0 上ハンドル（脚）先端</text>
    <text x="86" y="328">g1 下ハンドル（脚）先端</text>
    <text x="86" y="352">g2 上ジョー（鼻先）先端</text>
    <text x="86" y="376">g3 下ジョー（鼻先）先端</text>
    <text x="376" y="304">g5 金属スプリング・ハンドル側</text>
    <text x="376" y="328">g4 金属スプリング・上（＋pitch）</text>
    <text x="376" y="352">g6 金属スプリング・下（＋pitch）</text>
  </g>

  <circle cx="70" cy="404" r="6" fill="#f59e0b" stroke="#b45309" stroke-width="1.2"/>
  <text x="86" y="408" font-size="12" fill="#334155">アンバー＝roll のみ（1自由度: g0–g3, g5）</text>
  <circle cx="380" cy="404" r="6" fill="#0d9488" stroke="#0f766e" stroke-width="1.2"/>
  <text x="396" y="408" font-size="12" fill="#334155">ティール＝roll＋pitch（2自由度: g4, g6）</text>

  <circle cx="70" cy="430" r="6" fill="#ef6c4d" stroke="#b91c1c" stroke-width="1.2"/>
  <text x="86" y="434" font-size="12" fill="#334155">JAW（オス）：相手を挟む側・1ピンに1つ</text>
  <text x="70" y="460" font-size="12" fill="#64748b">回転は 30° 刻み。roll 範囲＝平先端 ±135° / リング ±90°、pitch（g4,g6）±90°（暫定）。</text>
</svg>
